<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETH Wallet Checker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --accent: #00ff88;
            --accent-dim: #00ff8833;
            --text-primary: #e8e8f0;
            --text-secondary: #8888a8;
            --error: #ff3366;
            --success: #00ff88;
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated background gradient */
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(0, 255, 136, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 50%, rgba(0, 120, 255, 0.05) 0%, transparent 50%);
            animation: gradientShift 15s ease infinite;
            z-index: 0;
        }

        @keyframes gradientShift {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-25%, -25%); }
        }

        /* Scan line effect */
        body::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            animation: scan 4s linear infinite;
            opacity: 0.3;
            z-index: 1;
        }

        @keyframes scan {
            0% { transform: translateY(0); }
            100% { transform: translateY(100vh); }
        }

        .container {
            position: relative;
            z-index: 2;
            width: 90%;
            max-width: 520px;
            background: rgba(18, 18, 26, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 48px 40px;
            box-shadow: 
                0 0 80px rgba(0, 255, 136, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            animation: fadeInScale 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo h1 {
            font-family: 'Syne', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent) 0%, #00ccff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
            animation: glow 3s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { filter: drop-shadow(0 0 10px rgba(0, 255, 136, 0.3)); }
            50% { filter: drop-shadow(0 0 20px rgba(0, 255, 136, 0.6)); }
        }

        .logo p {
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 300;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 12px;
            color: var(--text-secondary);
            font-size: 0.8rem;
            font-weight: 400;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            outline: none;
        }

        input:focus {
            border-color: var(--accent);
            background: rgba(0, 0, 0, 0.6);
            box-shadow: 0 0 0 3px var(--accent-dim);
        }

        input::placeholder {
            color: var(--text-secondary);
            opacity: 0.5;
        }

        button {
            width: 100%;
            padding: 18px;
            background: var(--accent);
            border: none;
            border-radius: 12px;
            color: var(--bg-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 255, 136, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        button:active::before {
            width: 300px;
            height: 300px;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(10, 10, 15, 0.3);
            border-top-color: var(--bg-primary);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .result {
            margin-top: 32px;
            padding: 24px;
            border-radius: 16px;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result.success {
            background: rgba(0, 255, 136, 0.1);
            border-color: var(--success);
        }

        .result.error {
            background: rgba(255, 51, 102, 0.1);
            border-color: var(--error);
        }

        .result-title {
            font-weight: 600;
            margin-bottom: 12px;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .result.success .result-title {
            color: var(--success);
        }

        .result.error .result-title {
            color: var(--error);
        }

        .result-content {
            color: var(--text-secondary);
            font-size: 0.85rem;
            line-height: 1.6;
        }

        .balance {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .balance-amount {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--accent);
            margin: 8px 0;
            letter-spacing: -0.02em;
        }

        .balance-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .icon {
            width: 20px;
            height: 20px;
            display: inline-block;
        }

        .footer {
            margin-top: 32px;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.75rem;
            opacity: 0.6;
        }

        @media (max-width: 600px) {
            .container {
                padding: 32px 24px;
            }

            .logo h1 {
                font-size: 2rem;
            }

            .balance-amount {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>ETHΣRBONUS</h1>
            <p>Wallet Eligibility Checker</p>
        </div>

        <form id="walletForm">
            <div class="form-group">
                <label for="walletAddress">Ethereum Address</label>
                <input 
                    type="text" 
                    id="walletAddress" 
                    placeholder="0x..." 
                    required
                    autocomplete="off"
                    spellcheck="false"
                >
            </div>
            <button type="submit" id="checkButton">
                <span>Check Eligibility</span>
            </button>
        </form>

        <div id="result"></div>

        <div class="footer">
            Powered by Ethereum Public RPC
        </div>
    </div>

    <script>
        const form = document.getElementById('walletForm');
        const walletInput = document.getElementById('walletAddress');
        const checkButton = document.getElementById('checkButton');
        const resultDiv = document.getElementById('result');

        // Публичные RPC endpoints (бесплатно, без регистрации)
        const RPC_ENDPOINTS = [
            'https://eth.llamarpc.com',
            'https://rpc.ankr.com/eth',
            'https://ethereum.publicnode.com',
            'https://1rpc.io/eth',
            'https://eth.drpc.org'
        ];

        function isValidAddress(address) {
            return /^0x[a-fA-F0-9]{40}$/.test(address);
        }

        function formatBalance(wei) {
            // Конвертируем hex в decimal, потом в ETH
            const weiDecimal = parseInt(wei, 16);
            const eth = weiDecimal / 1e18;
            return eth.toFixed(4);
        }

        async function checkWallet(address) {
            // Пробуем разные RPC endpoints пока не получим ответ
            for (const rpcUrl of RPC_ENDPOINTS) {
                try {
                    const response = await fetch(rpcUrl, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            jsonrpc: '2.0',
                            method: 'eth_getBalance',
                            params: [address, 'latest'],
                            id: 1
                        })
                    });
                    
                    const data = await response.json();
                    
                    if (data.result) {
                        return {
                            success: true,
                            balance: data.result
                        };
                    }
                } catch (error) {
                    // Если один RPC не работает, пробуем следующий
                    console.log(`RPC ${rpcUrl} failed, trying next...`);
                    continue;
                }
            }
            
            throw new Error('Не удалось подключиться к сети Ethereum. Попробуйте позже.');
        }

        function showResult(isEligible, balance = null, error = null) {
            if (error) {
                resultDiv.innerHTML = `
                    <div class="result error">
                        <div class="result-title">
                            <span class="icon">⚠️</span>
                            Ошибка проверки
                        </div>
                        <div class="result-content">
                            ${error}
                        </div>
                    </div>
                `;
                return;
            }

            const ethBalance = formatBalance(balance);
            const hasBalance = parseFloat(ethBalance) > 0;

            if (hasBalance) {
                resultDiv.innerHTML = `
                    <div class="result success">
                        <div class="result-title">
                            <span class="icon">✓</span>
                            Поздравляем! Кошелек соответствует требованиям
                        </div>
                        <div class="result-content">
                            Ваш кошелек имеет активный баланс и может получить бонус!
                        </div>
                        <div class="balance">
                            <div class="balance-label">Текущий баланс</div>
                            <div class="balance-amount">${ethBalance} ETH</div>
                        </div>
                    </div>
                `;
            } else {
                resultDiv.innerHTML = `
                    <div class="result error">
                        <div class="result-title">
                            <span class="icon">✗</span>
                            Кошелек не соответствует требованиям
                        </div>
                        <div class="result-content">
                            К сожалению, на этом кошельке недостаточно средств для получения бонуса. Пополните баланс и попробуйте снова.
                        </div>
                        <div class="balance">
                            <div class="balance-label">Текущий баланс</div>
                            <div class="balance-amount">${ethBalance} ETH</div>
                        </div>
                    </div>
                `;
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const address = walletInput.value.trim();
            
            // Валидация адреса
            if (!isValidAddress(address)) {
                showResult(false, null, 'Некорректный адрес кошелька. Адрес должен начинаться с 0x и содержать 40 символов.');
                return;
            }

            // Показываем загрузку
            checkButton.disabled = true;
            checkButton.innerHTML = '<span class="spinner"></span> Проверка...';
            resultDiv.innerHTML = '';

            try {
                const result = await checkWallet(address);
                showResult(true, result.balance);
            } catch (error) {
                showResult(false, null, error.message);
            } finally {
                checkButton.disabled = false;
                checkButton.innerHTML = '<span>Check Eligibility</span>';
            }
        });
    </script>
</body>
</html>
