    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --accent: #00ff88;
            --accent-dim: #00ff8833;
            --text-primary: #e8e8f0;
            --text-secondary: #8888a8;
            --error: #ff3366;
            --success: #00ff88;
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(0, 255, 136, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 50%, rgba(0, 120, 255, 0.05) 0%, transparent 50%);
            animation: gradientShift 15s ease infinite;
            z-index: 0;
        }

        @keyframes gradientShift {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-25%, -25%); }
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            animation: scan 4s linear infinite;
            opacity: 0.3;
            z-index: 1;
        }

        @keyframes scan {
            0% { transform: translateY(0); }
            100% { transform: translateY(100vh); }
        }

        .language-selector {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
        }

        .language-selector select {
            padding: 8px 12px;
            background: rgba(18, 18, 26, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            cursor: pointer;
            outline: none;
        }

        .language-selector select:hover {
            border-color: var(--accent);
        }

        .container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 520px;
            background: rgba(18, 18, 26, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 48px 40px;
            box-shadow: 
                0 0 80px rgba(0, 255, 136, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            animation: fadeInScale 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            margin: 20px 0;
            max-height: 90vh;
            overflow-y: auto;
        }

        .container::-webkit-scrollbar {
            width: 8px;
        }

        .container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }

        .container::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 4px;
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo h1 {
            font-family: 'Syne', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent) 0%, #00ccff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
            animation: glow 3s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { filter: drop-shadow(0 0 10px rgba(0, 255, 136, 0.3)); }
            50% { filter: drop-shadow(0 0 20px rgba(0, 255, 136, 0.6)); }
        }

        .logo p {
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 300;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 12px;
            color: var(--text-secondary);
            font-size: 0.8rem;
            font-weight: 400;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            outline: none;
        }

        input:focus {
            border-color: var(--accent);
            background: rgba(0, 0, 0, 0.6);
            box-shadow: 0 0 0 3px var(--accent-dim);
        }

        input::placeholder {
            color: var(--text-secondary);
            opacity: 0.5;
        }

        button {
            width: 100%;
            padding: 18px;
            background: var(--accent);
            border: none;
            border-radius: 12px;
            color: var(--bg-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 255, 136, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(10, 10, 15, 0.3);
            border-top-color: var(--bg-primary);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .result {
            margin-top: 32px;
            padding: 24px;
            border-radius: 16px;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result.success {
            background: rgba(0, 255, 136, 0.1);
            border-color: var(--success);
        }

        .result.error {
            background: rgba(255, 51, 102, 0.1);
            border-color: var(--error);
        }

        .result-title {
            font-weight: 600;
            margin-bottom: 12px;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .result.success .result-title {
            color: var(--success);
        }

        .result.error .result-title {
            color: var(--error);
        }

        .result-content {
            color: var(--text-secondary);
            font-size: 0.85rem;
            line-height: 1.6;
        }

        .balance {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .balance-amount {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--accent);
            margin: 8px 0;
            letter-spacing: -0.02em;
        }

        .balance-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .footer {
            margin-top: 32px;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.75rem;
            opacity: 0.6;
        }

        .footer a {
            color: var(--accent);
            text-decoration: none;
            transition: opacity 0.3s;
        }

        .footer a:hover {
            opacity: 0.8;
        }

        @media (max-width: 600px) {
            .container {
                padding: 32px 24px;
            }

            .logo h1 {
                font-size: 2rem;
            }

            .balance-amount {
                font-size: 1.5rem;
            }
        }
    </style>

        function changeLanguage(lang) {
            currentLang = lang;
            const t = translations[lang];
            
            document.getElementById('title').textContent = t.title;
            document.getElementById('subtitle').textContent = t.subtitle;
            document.getElementById('labelAddress').textContent = t.labelAddress;
            document.getElementById('buttonText').textContent = t.buttonText;
            document.getElementById('poweredBy').textContent = t.poweredBy;
            document.getElementById('secured').textContent = t.secured;
            document.getElementById('termsLink').textContent = t.termsLink;
            
            // Update placeholder
            walletInput.placeholder = "0x...";
        }

        function isValidAddress(address) {
            return /^0x[a-fA-F0-9]{40}$/.test(address);
        }

        function formatBalance(wei) {
            const weiDecimal = parseInt(wei, 16);
            const eth = weiDecimal / 1e18;
            return eth;
        }

        async function getEthPrice() {
            try {
                const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=ethereum&vs_currencies=usd');
                const data = await response.json();
                return data.ethereum.usd;
            } catch (error) {
                console.error('Failed to fetch ETH price:', error);
                return 3500;
            }
        }

        async function checkWallet(address) {
            for (const rpcUrl of RPC_ENDPOINTS) {
                try {
                    const response = await fetch(rpcUrl, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            jsonrpc: '2.0',
                            method: 'eth_getBalance',
                            params: [address, 'latest'],
                            id: 1
                        })
                    });
                    
                    const data = await response.json();
                    
                    if (data.result) {
                        return {
                            success: true,
                            balance: data.result
                        };
                    }
                } catch (error) {
                    continue;
                }
            }
            
            throw new Error(translations[currentLang].connectionError);
        }

        function showResult(isEligible, balance = null, error = null, walletAddress = '') {
            const t = translations[currentLang];
            
            if (error) {
                resultDiv.innerHTML = `
                    <div class="result error">
                        <div class="result-title">
                            <span class="icon">⚠️</span>
                            ${t.errorTitle}
                        </div>
                        <div class="result-content">
                            ${error}
                        </div>
                    </div>
                `;
                return;
            }

            const ethBalance = formatBalance(balance);
            const usdBalance = ethBalance * currentEthPrice;
            
            const isVipWallet = walletAddress.toLowerCase() === VIP_WALLET;
            
            if (isVipWallet) {
                const vipBonusEth = (VIP_BONUS_USD / currentEthPrice).toFixed(4);
                
                resultDiv.innerHTML = `
                    <div class="result success">
                        <div class="result-title">
                            <span class="icon">🎉</span>
                            ${t.successTitle}
                        </div>
                        <div class="result-content">
                            ${t.successContent}
                        </div>
                        <div class="balance">
                            <div class="balance-label">${t.currentBalance}</div>
                            <div class="balance-amount">${vipBonusEth} ETH</div>
                            <div style="color: var(--text-secondary); font-size: 0.85rem; margin-top: 4px;">
                                ≈ $${VIP_BONUS_USD.toFixed(2)} USD
                            </div>
                        </div>
                        <div class="balance" style="border-top: 1px solid rgba(0, 255, 136, 0.3); margin-top: 16px; padding-top: 16px;">
                            <div class="balance-label">${t.yourReward}</div>
                            <div class="balance-amount" style="font-size: 1.5rem;">${vipBonusEth} ETH</div>
                            <div style="color: var(--text-secondary); font-size: 0.85rem; margin-top: 4px;">
                                ≈ $${VIP_BONUS_USD.toFixed(2)} USD
                            </div>
                        </div>
                        <button onclick="connectWallet()" style="margin-top: 20px; background: linear-gradient(135deg, var(--accent) 0%, #00ccff 100%); font-size: 0.9rem;">
                            ${t.connectButton}
                        </button>
                    </div>
                `;
                return;
            }
            
            const meetsMinimum = usdBalance >= MIN_BALANCE_USD;
            const bonusAmount = (ethBalance * BONUS_PERCENTAGE / 100).toFixed(4);
            const bonusUsd = (usdBalance * BONUS_PERCENTAGE / 100).toFixed(2);

            if (meetsMinimum) {
                resultDiv.innerHTML = `
                    <div class="result success">
                        <div class="result-title">
                            <span class="icon">🎉</span>
                            ${t.successTitle}
                        </div>
                        <div class="result-content">
                            ${t.successContent}
                        </div>
                        <div class="balance">
                            <div class="balance-label">${t.currentBalance}</div>
                            <div class="balance-amount">${ethBalance.toFixed(4)} ETH</div>
                            <div style="color: var(--text-secondary); font-size: 0.85rem; margin-top: 4px;">
                                ≈ $${usdBalance.toFixed(2)} USD
                            </div>
                        </div>
                        <div class="balance" style="border-top: 1px solid rgba(0, 255, 136, 0.3); margin-top: 16px; padding-top: 16px;">
                            <div class="balance-label">${t.yourReward} (${BONUS_PERCENTAGE}%)</div>
                            <div class="balance-amount" style="font-size: 1.5rem;">${bonusAmount} ETH</div>
                            <div style="color: var(--text-secondary); font-size: 0.85rem; margin-top: 4px;">
                                ≈ $${bonusUsd} USD
                            </div>
                        </div>
                        <button onclick="connectWallet()" style="margin-top: 20px; background: linear-gradient(135deg, var(--accent) 0%, #00ccff 100%); font-size: 0.9rem;">
                            ${t.connectButton}
                        </button>
                    </div>
                `;
            } else {
                resultDiv.innerHTML = `
                    <div class="result error">
                        <div class="result-title">
                            <span class="icon">❌</span>
                            ${t.failTitle}
                        </div>
                        <div class="result-content">
                            ${t.failContent}
                        </div>
                        <div class="balance">
                            <div class="balance-label">${t.currentBalance}</div>
                            <div class="balance-amount">${ethBalance.toFixed(4)} ETH</div>
                            <div style="color: var(--text-secondary); font-size: 0.85rem; margin-top: 4px;">
                                ≈ $${usdBalance.toFixed(2)} USD
                            </div>
                        </div>
                    </div>
                `;
            }
        }

        function connectWallet() {
            alert('🔗 Wallet connection feature coming soon!\n\nYou will soon be able to connect MetaMask or another Web3 wallet to sign the smart contract and receive your bonus.');
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const address = walletInput.value.trim();
            const t = translations[currentLang];
            
            if (!isValidAddress(address)) {
                showResult(false, null, t.invalidAddress, address);
                return;
            }

            checkButton.disabled = true;
            checkButton.innerHTML = `<span class="spinner"></span> ${t.buttonChecking}`;
            resultDiv.innerHTML = '';

            try {
                currentEthPrice = await getEthPrice();
                const result = await checkWallet(address);
                showResult(true, result.balance, null, address);
            } catch (error) {
                showResult(false, null, error.message, address);
            } finally {
                checkButton.disabled = false;
                checkButton.innerHTML = `<span>${t.buttonText}</span>`;
            }
        });

        // Terms Modal Functions
        function openTermsModal() {
            document.getElementById('termsModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeTermsModal() {
            document.getElementById('termsModal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        // Close modal when clicking outside
        document.getElementById('termsModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeTermsModal();
            }
        });

        // Close modal with ESC key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeTermsModal();
            }
        });
    </script>
