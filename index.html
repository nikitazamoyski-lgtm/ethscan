<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETH Wallet Checker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 48px;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        h1 {
            font-size: 32px;
            font-weight: 900;
            color: #1a202c;
            text-align: center;
            margin-bottom: 12px;
        }

        .subtitle {
            text-align: center;
            color: #718096;
            font-size: 16px;
            margin-bottom: 32px;
        }

        .input-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            font-family: 'Courier New', monospace;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 30px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #e2e8f0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: #718096;
            font-size: 14px;
        }

        .result {
            display: none;
            margin-top: 30px;
            padding: 30px;
            border-radius: 16px;
            animation: fadeIn 0.4s ease;
        }

        .result.show {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .result.success {
            background: linear-gradient(135deg, #d4fc79 0%, #96e6a1 100%);
        }

        .result.error {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
        }

        .result-header {
            text-align: center;
            margin-bottom: 24px;
        }

        .result-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .result-title {
            font-size: 24px;
            font-weight: 700;
            color: #1a202c;
            margin-bottom: 8px;
        }

        .result-subtitle {
            font-size: 14px;
            color: #4a5568;
        }

        .stats {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #e2e8f0;
        }

        .stat-row:last-child {
            border-bottom: none;
        }

        .stat-label {
            font-weight: 600;
            color: #4a5568;
            font-size: 14px;
        }

        .stat-value {
            font-weight: 700;
            color: #1a202c;
            font-size: 16px;
        }

        .bonus-box {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 24px;
            border-radius: 12px;
            text-align: center;
        }

        .bonus-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 8px;
        }

        .bonus-amount {
            font-size: 36px;
            font-weight: 900;
            margin-bottom: 4px;
        }

        .bonus-usd {
            font-size: 16px;
            opacity: 0.8;
        }

        .claim-btn {
            width: 100%;
            padding: 16px;
            background: #48bb78;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.2s;
        }

        .claim-btn:hover {
            background: #38a169;
            transform: translateY(-2px);
        }

        .test-links {
            margin-top: 20px;
            padding: 16px;
            background: #f7fafc;
            border-radius: 12px;
            font-size: 13px;
        }

        .test-title {
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 8px;
        }

        .test-link {
            display: block;
            color: #667eea;
            text-decoration: none;
            margin: 4px 0;
            font-family: 'Courier New', monospace;
        }

        .test-link:hover {
            text-decoration: underline;
        }

        @media (max-width: 640px) {
            .container {
                padding: 32px 24px;
            }

            h1 {
                font-size: 28px;
            }

            .bonus-amount {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <div class="logo-icon">💎</div>
        </div>

        <h1>ETH Wallet Checker</h1>
        <p class="subtitle">Check your Ethereum wallet balance and bonus eligibility</p>

        <div class="input-group">
            <label for="address">Ethereum Wallet Address</label>
            <input 
                type="text" 
                id="address" 
                placeholder="0xd8dA6BF26964aF9D7eEd9e03E53415D37aA96045"
                autocomplete="off"
            >
        </div>

        <button class="btn" onclick="checkWallet()" id="checkBtn">
            Check Wallet
        </button>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div class="loading-text">Scanning blockchain...</div>
        </div>

        <div class="result" id="result"></div>

        <div class="test-links">
            <div class="test-title">🧪 Test Addresses (click to use):</div>
            <a href="#" class="test-link" onclick="fillAddress('0xd8dA6BF26964aF9D7eEd9e03E53415D37aA96045'); return false;">
                Vitalik (Large Balance)
            </a>
            <a href="#" class="test-link" onclick="fillAddress('0x742d35Cc6634C0532925a3b844Bc9e7595f0bEb'); return false;">
                Random Address
            </a>
            <a href="#" class="test-link" onclick="fillAddress('0x0000000000000000000000000000000000000000'); return false;">
                Zero Balance
            </a>
        </div>
    </div>

    <script>
        const ETH_PRICE = 3500;

        function fillAddress(addr) {
            document.getElementById('address').value = addr;
            document.getElementById('address').focus();
        }

        async function checkWallet() {
            console.log('🔍 Starting wallet check...');
            
            const input = document.getElementById('address');
            const address = input.value.trim();
            const btn = document.getElementById('checkBtn');
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');

            // Validate
            if (!address || !address.match(/^0x[a-fA-F0-9]{40}$/)) {
                alert('❌ Invalid Ethereum address!\n\nFormat: 0x followed by 40 hex characters');
                return;
            }

            console.log('✓ Address valid:', address);

            // Show loading
            loading.classList.add('show');
            result.classList.remove('show');
            btn.disabled = true;

            try {
                console.log('📡 METHOD 1: Trying direct Etherscan API...');
                
                // Try direct API first
                const balanceUrl = `https://api.etherscan.io/api?module=account&action=balance&address=${address}&tag=latest`;
                const txCountUrl = `https://api.etherscan.io/api?module=account&action=txlist&address=${address}&startblock=0&endblock=99999999&page=1&offset=10&sort=asc`;
                
                const balanceResponse = await fetch(balanceUrl);
                const balanceData = await balanceResponse.json();
                
                console.log('📊 Balance response:', balanceData);

                if (balanceData.status !== '1') {
                    throw new Error('API returned error status');
                }

                const balanceWei = balanceData.result;
                const balanceETH = (parseInt(balanceWei) / 1e18).toFixed(4);
                
                console.log('💰 Balance:', balanceETH, 'ETH');

                // Get transactions
                const txResponse = await fetch(txCountUrl);
                const txData = await txResponse.json();
                
                console.log('📝 Transaction response:', txData);

                const txCount = (txData.status === '1' && txData.result) ? txData.result.length : 0;
                
                console.log('✓ Transaction count:', txCount);

                // Calculate bonus
                const hasBalance = parseFloat(balanceETH) > 0;
                const isEligible = hasBalance && txCount >= 3;
                const bonusETH = isEligible ? (parseFloat(balanceETH) * 0.20).toFixed(4) : '0.0000';
                const bonusUSD = (parseFloat(bonusETH) * ETH_PRICE).toFixed(2);

                console.log('✅ METHOD 1 SUCCESS!');
                console.log('🎁 Eligible:', isEligible);
                console.log('🎁 Bonus:', bonusETH, 'ETH');

                loading.classList.remove('show');
                btn.disabled = false;

                displayResult(balanceETH, txCount, isEligible, bonusETH, bonusUSD);

            } catch (error) {
                console.error('❌ METHOD 1 FAILED:', error.message);
                console.log('🔄 METHOD 2: Trying CORS proxy...');
                
                try {
                    // Method 2: Use CORS proxy
                    const proxyUrl = 'https://api.allorigins.win/raw?url=';
                    const etherscanPage = `https://etherscan.io/address/${address}`;
                    const fullUrl = proxyUrl + encodeURIComponent(etherscanPage);
                    
                    console.log('📡 Fetching via proxy...');
                    
                    const response = await fetch(fullUrl);
                    const html = await response.text();
                    
                    console.log('📄 HTML received, length:', html.length);

                    // Parse balance from HTML
                    let balanceETH = '0.0000';
                    const balanceMatch = html.match(/Balance:<\/div>\s*<div[^>]*>\s*([\d,]+\.?\d*)\s*(?:Ether|ETH)/i) ||
                                        html.match(/([\d,]+\.\d{4})\s*(?:Ether|ETH)/);
                    
                    if (balanceMatch && balanceMatch[1]) {
                        balanceETH = balanceMatch[1].replace(/,/g, '');
                        console.log('💰 Balance found:', balanceETH, 'ETH');
                    } else {
                        console.log('⚠️ Could not parse balance, using 0');
                    }

                    // Parse transaction count from HTML
                    let txCount = 0;
                    const txMatch = html.match(/>([\d,]+)\s*(?:txns|transactions)/i);
                    if (txMatch && txMatch[1]) {
                        txCount = parseInt(txMatch[1].replace(/,/g, ''));
                        console.log('📝 Transactions found:', txCount);
                    } else {
                        // Estimate: if balance > 0, assume at least 1 transaction
                        txCount = parseFloat(balanceETH) > 0 ? 5 : 0;
                        console.log('⚠️ Could not parse tx count, estimating:', txCount);
                    }

                    // Calculate bonus
                    const hasBalance = parseFloat(balanceETH) > 0;
                    const isEligible = hasBalance && txCount >= 3;
                    const bonusETH = isEligible ? (parseFloat(balanceETH) * 0.20).toFixed(4) : '0.0000';
                    const bonusUSD = (parseFloat(bonusETH) * ETH_PRICE).toFixed(2);

                    console.log('✅ METHOD 2 SUCCESS!');
                    console.log('🎁 Eligible:', isEligible);
                    console.log('🎁 Bonus:', bonusETH, 'ETH');

                    loading.classList.remove('show');
                    btn.disabled = false;

                    displayResult(parseFloat(balanceETH).toFixed(4), txCount, isEligible, bonusETH, bonusUSD);

                } catch (error2) {
                    console.error('❌ METHOD 2 ALSO FAILED:', error2.message);
                    console.log('⚠️ ALL METHODS FAILED');
                    
                    loading.classList.remove('show');
                    btn.disabled = false;

                    result.className = 'result error show';
                    result.innerHTML = `
                        <div class="result-header">
                            <div class="result-icon">⚠️</div>
                            <div class="result-title">Connection Error</div>
                            <div class="result-subtitle">Unable to fetch wallet data</div>
                        </div>
                        <div class="stats">
                            <p style="color: #e53e3e; text-align: center; line-height: 1.6;">
                                <strong>Both methods failed:</strong><br><br>
                                Method 1: ${error.message}<br>
                                Method 2: ${error2.message}<br><br>
                                <strong>Solutions:</strong><br>
                                • Open in different browser<br>
                                • Disable VPN/firewall<br>
                                • Check console (F12) for details<br>
                                • Verify address on etherscan.io first
                            </p>
                        </div>
                    `;
                }
            }
        }

        function displayResult(balance, txCount, isEligible, bonus, bonusUSD) {
            const result = document.getElementById('result');

            if (!isEligible) {
                // NOT ELIGIBLE
                result.className = 'result error show';
                
                let reason = '';
                if (parseFloat(balance) === 0) {
                    reason = 'Wallet has zero balance';
                } else if (txCount < 3) {
                    reason = `Only ${txCount} transaction${txCount === 1 ? '' : 's'} found (need 3+)`;
                }

                result.innerHTML = `
                    <div class="result-header">
                        <div class="result-icon">❌</div>
                        <div class="result-title">Not Eligible</div>
                        <div class="result-subtitle">${reason}</div>
                    </div>
                    <div class="stats">
                        <div class="stat-row">
                            <span class="stat-label">Balance</span>
                            <span class="stat-value">${balance} ETH</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">Transactions</span>
                            <span class="stat-value">${txCount}</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">Status</span>
                            <span class="stat-value" style="color: #e53e3e;">Not Eligible</span>
                        </div>
                    </div>
                `;
            } else {
                // ELIGIBLE!
                result.className = 'result success show';
                result.innerHTML = `
                    <div class="result-header">
                        <div class="result-icon">✅</div>
                        <div class="result-title">Eligible for Bonus!</div>
                        <div class="result-subtitle">You qualify for rewards</div>
                    </div>
                    <div class="stats">
                        <div class="stat-row">
                            <span class="stat-label">Balance</span>
                            <span class="stat-value">${balance} ETH</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">Transactions</span>
                            <span class="stat-value">${txCount}</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">Status</span>
                            <span class="stat-value" style="color: #48bb78;">✓ Eligible</span>
                        </div>
                    </div>
                    <div class="bonus-box">
                        <div class="bonus-label">Your Bonus (20%)</div>
                        <div class="bonus-amount">${bonus} ETH</div>
                        <div class="bonus-usd">≈ $${bonusUSD.replace(/\B(?=(\d{3})+(?!\d))/g, ",")}</div>
                    </div>
                    <button class="claim-btn" onclick="claimBonus()">
                        Claim Bonus Now
                    </button>
                `;
            }
        }

        function claimBonus() {
            alert('🎉 Claim feature will be integrated with Web3 wallet (MetaMask, WalletConnect, etc.)');
        }

        // Enter key support
        document.getElementById('address').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkWallet();
            }
        });

        console.log('✅ ETH Wallet Checker loaded');
        console.log('🧪 Try: 0xd8dA6BF26964aF9D7eEd9e03E53415D37aA96045');
    </script>
</body>
</html>
